name: Android-Linux-Fast
on: 
  workflow_dispatch:
    inputs:
      authcode:
        description: 'Enter Google CRD Linux (Debian) Code'
        required: true
      pincode:
        description: 'Six digit Pin'
        required: true

jobs:
  Build-Android:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install Desktop and CRD
      run: |
        sudo apt update
        # Install a lightweight desktop (XFCE) and CRD
        sudo apt install -y xfce4 desktop-base xfce4-goodies
        wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
        sudo apt install -y ./chrome-remote-desktop_current_amd64.deb
        
    - name: Setup Android Emulator
      run: |
        # Install Android tools and system images
        sudo apt install -y cpu-checker
        # Check if KVM is available (it should be on Ubuntu-latest)
        kvm-ok
        sudo apt install -y sdkmanager
        sdkmanager --install "system-images;android-30;google_apis;x86_64" "emulator" "platform-tools"
        echo "no" | avdmanager create avd -n "AndroidPhone" -k "system-images;android-30;google_apis;x86_64"

    - name: Start CRD and Phone
      run: |
        # Start the CRD service using your code
        ${{ github.event.inputs.authcode }} --pin=${{ github.event.inputs.pincode }}
        # Start the emulator inside the virtual display
        DISPLAY=:0 emulator -avd AndroidPhone -no-audio -no-boot-anim -gpu host &
        
    - name: Keep Alive
      run: sleep 21600 # 6 hours

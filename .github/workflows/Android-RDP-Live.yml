name: Android-Linux-Fast

on:
  workflow_dispatch:
    inputs:
      authcode:
        description: 'Chrome Remote Desktop Auth Code'
        required: true
      pincode:
        description: '6-digit PIN'
        required: true

jobs:
  Build-Android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip openjdk-17-jdk xfce4 desktop-base

      # ===================== ANDROID SDK SETUP =====================
      - name: Install Android SDK
        run: |
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          cd $HOME
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip

          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/emulator" >> $GITHUB_PATH

      # ===================== SDK PACKAGES =====================
      - name: Install SDK packages
        run: |
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

          sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
            "platform-tools" \
            "emulator" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64"

      # ===================== CREATE AVD (FIXED) =====================
      - name: Create AVD
        run: |
          mkdir -p $HOME/.android/avd

          yes | avdmanager \
            --sdk_root $ANDROID_SDK_ROOT \
            create avd \
            -n AndroidPhone \
            -k "system-images;android-34;google_apis;x86_64" \
            --device "pixel"

          echo "===== AVD LIST ====="
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/avdmanager list avd || true
          ls -la $HOME/.android/avd || true

      # ===================== START EMULATOR =====================
      - name: Start emulator
        run: |
          nohup $ANDROID_SDK_ROOT/emulator/emulator \
            -avd AndroidPhone \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -no-snapshot \
            -wipe-data \
            -show-kernel &

          sleep 90

      # ===================== CHROME REMOTE DESKTOP =====================
      - name: Start Chrome Remote Desktop
        run: |
          wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo apt install -y ./chrome-remote-desktop_current_amd64.deb

          ${{ github.event.inputs.authcode }} --pin=${{ github.event.inputs.pincode }}

      # ===================== KEEP RUNNER ALIVE =====================
      - name: Keep alive
        run: sleep 21600

name: Android-Linux-Fast

on:
  workflow_dispatch:
    inputs:
      authcode:
        required: true
        description: "CRD code"
      pincode:
        required: true
        description: "PIN"

jobs:
  android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip cpu-checker xfce4 xfce4-goodies desktop-base

          wget -q https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo apt install -y ./chrome-remote-desktop_current_amd64.deb

      - name: Install Android SDK (FIXED)
        run: |
          sudo apt update
          sudo apt install -y google-android-cmdline-tools-13.0-installer

      - name: Setup SDK + Emulator (NO NULL ERRORS)
        run: |
          set -e

          export ANDROID_SDK_ROOT=/usr/lib/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator

          # Force refresh SDK repository (IMPORTANT FIX)
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT --update

          # Accept ALL licenses (critical fix for your earlier errors)
          yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

          # Install stable Android 36 components
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT --install \
            "platform-tools" \
            "emulator" \
            "platforms;android-36" \
            "system-images;android-36;google_apis;x86_64"

          # VERIFY image actually exists (THIS PREVENTS YOUR NULL ERROR)
          sdkmanager --sdk_root=$ANDROID_SDK_ROOT --list | grep "system-images;android-36;google_apis;x86_64"

          # ONLY create AVD if install succeeded
          echo "no" | avdmanager create avd \
            -n AndroidPhone \
            -k "system-images;android-36;google_apis;x86_64" \
            --force

      - name: Start CRD + Emulator
        run: |
          export ANDROID_SDK_ROOT=/usr/lib/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/platform-tools:$ANDROID_SDK_ROOT/emulator

          ${{ github.event.inputs.authcode }} --pin=${{ github.event.inputs.pincode }}

          nohup emulator \
            -avd AndroidPhone \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -accel on \
            -no-snapshot \
            >/tmp/emulator.log 2>&1 &

          adb wait-for-device

      - name: Keep Alive
        run: sleep 21600

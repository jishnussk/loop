name: Android-Linux-Fast

on:
  workflow_dispatch:
    inputs:
      authcode:
        description: 'Chrome Remote Desktop Auth Code'
        required: true
      pincode:
        description: '6-digit PIN'
        required: true

jobs:
  Build-Android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y wget unzip openjdk-17-jdk

      - name: Install Android SDK (FIXED)
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools

          cd $HOME/android-sdk

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          unzip -q commandlinetools-linux-11076708_latest.zip

          mkdir -p cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Accept licenses + install SDK packages
        run: |
          yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses

          sdkmanager --sdk_root=$HOME/android-sdk \
            "platform-tools" \
            "emulator" \
            "platforms;android-34" \
            "system-images;android-34;google_apis;x86_64"

      - name: Create Android Virtual Device
        run: |
          echo "no" | avdmanager create avd \
            -n AndroidPhone \
            -k "system-images;android-34;google_apis;x86_64" \
            --device "pixel"

      - name: Start emulator
        run: |
          nohup $HOME/android-sdk/emulator/emulator \
            -avd AndroidPhone \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect &
          sleep 30

      - name: Start Chrome Remote Desktop
        run: |
          sudo apt install -y xfce4 desktop-base
          wget https://dl.google.com/linux/direct/chrome-remote-desktop_current_amd64.deb
          sudo apt install -y ./chrome-remote-desktop_current_amd64.deb

          ${{ github.event.inputs.authcode }} --pin=${{ github.event.inputs.pincode }}

      - name: Keep alive
        run: sleep 21600
